<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MTV Campus · Scenario Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;font-size:13px;color:#222;background:#fff;padding:12px}
.top{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
.btn{padding:4px 10px;font-size:11px;border:1px solid #ccc;border-radius:20px;cursor:pointer;background:#fff;color:#555}
.btn:hover{background:#f5f5f5}
.btn:disabled{opacity:0.3;cursor:default}
.stabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.stab{padding:4px 12px;font-size:12px;border-radius:20px;border:1px solid #ccc;cursor:pointer;background:#fff;color:#666}
.stab.active{background:#222;color:#fff;border-color:#222}
.stab-add{padding:4px 12px;font-size:12px;border-radius:20px;border:1px dashed #ccc;cursor:pointer;background:#fff;color:#aaa}
.legend{display:flex;gap:12px;margin-bottom:8px;font-size:11px;color:#666;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:4px}
.leg-sw{width:12px;height:10px;border-radius:2px}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.scard{background:#f5f5f5;border-radius:6px;padding:8px 12px}
.scard-label{font-size:11px;color:#888;margin-bottom:2px}
.scard-val{font-size:18px;font-weight:500}
.gwrap{overflow-x:auto;border:1px solid #e0e0e0;border-radius:6px;position:relative}
.bar{height:14px;border-radius:2px;position:absolute;top:6px;z-index:1;cursor:grab;user-select:none}
.bar:hover{outline:2px solid rgba(0,0,0,0.2)}
.b-pl{background:#FAC775}.b-dp{background:#85B7EB}.b-cx{background:#1D9E75}
.b-fo{background:#AFA9EC}.b-mo{background:#F0997B}.b-xx{background:#B4B2A9}
.b-mv{background:#EF9F27;width:10px;height:10px;border-radius:50%;top:8px}
.rh{position:absolute;top:0;bottom:0;width:6px;cursor:ew-resize;z-index:2}
.dh{cursor:grab;color:#bbb;padding:0 4px;user-select:none}
.tbd-pill{font-size:9px;padding:2px 5px;border-radius:8px;cursor:pointer;white-space:nowrap}
.ib{background:none;border:none;cursor:pointer;color:#bbb;padding:0 2px;font-size:13px}
.ib:hover{color:#555}
.note{font-size:11px;color:#aaa;margin-top:8px}
.tip{position:fixed;background:#222;color:#fff;font-size:11px;padding:4px 8px;border-radius:4px;pointer-events:none;z-index:999;display:none}
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.25);z-index:100;display:flex;justify-content:flex-end;align-items:flex-start;padding:12px}
.ep{background:#fff;border:1px solid #ddd;border-radius:10px;padding:16px;width:280px;max-height:90vh;overflow-y:auto;font-size:12px}
.et{font-size:13px;font-weight:500;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.fi{margin-bottom:10px}
.fi label{display:block;font-size:11px;color:#888;margin-bottom:3px}
.fi input,.fi select{width:100%;font-size:12px;padding:4px 8px;height:28px;border:1px solid #ddd;border-radius:4px}
.pr{display:flex;gap:5px;align-items:center;padding:5px 7px;border:1px solid #eee;border-radius:5px;margin-bottom:5px;background:#fafafa}
.pd{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.eb{flex:1;font-size:12px;padding:5px;cursor:pointer;border:1px solid #ddd;border-radius:4px;background:#fff}
.eb-d{color:#c0392b;border-color:#f5c6c6}
tr.drag-over td{border-top:2px solid #378ADD}
tr.drag-over-below td{border-bottom:2px solid #378ADD}
tr.dragging{opacity:0.4}
</style>
</head>
<body>
<div class="top">
  <strong style="font-size:13px;color:#555">MTV Campus · Scenario Planner</strong>
  <button class="btn" id="ubtn" disabled onclick="doUndo()">↩ Undo</button>
  <button class="btn" onclick="doExport()">⬇ Export</button>
  <button class="btn" onclick="showImport()">⬆ Import JSON</button>
  <span style="font-size:10px;color:#aaa;margin-left:auto">drag bars · edges to resize · click name to edit</span>
</div>
<div class="stabs" id="tabs"></div>
<div class="summary" id="summary"></div>
<div class="legend">
  <div class="leg-item"><div class="leg-sw" style="background:#FAC775"></div>Planning</div>
  <div class="leg-item"><div class="leg-sw" style="background:#85B7EB"></div>Design &amp; Permitting</div>
  <div class="leg-item"><div class="leg-sw" style="background:#1D9E75"></div>Construction</div>
  <div class="leg-item"><div class="leg-sw" style="background:#AFA9EC"></div>Fit-out</div>
  <div class="leg-item"><div class="leg-sw" style="background:#F0997B"></div>Move</div>
  <div class="leg-item"><div class="leg-sw" style="background:#EF9F27;border-radius:50%"></div>FDOB</div>
  <div class="leg-item"><div class="leg-sw" style="background:#B4B2A9"></div>Cancelled</div>
  <div class="leg-item"><div class="leg-sw" style="background:rgba(226,75,74,0.15);border:1px solid #E24B4A"></div>Today</div>
</div>
<div class="gwrap" id="gwrap"></div>
<div class="note" id="note"></div>
<div id="ed"></div>
<div class="tip" id="tip"></div>
<script>
var PM={
  pl:{label:"Planning",color:"#FAC775"},
  dp:{label:"Design & Permitting",color:"#85B7EB"},
  cx:{label:"Construction",color:"#1D9E75"},
  fo:{label:"Fit-out",color:"#AFA9EC"},
  mo:{label:"Move",color:"#F0997B"},
  mv:{label:"FDOB",color:"#EF9F27"},
  xx:{label:"Cancelled",color:"#B4B2A9"}
};

var POR=[
  {name:"MTV-7 Flex (Floor 1)",tbd:false,budget:"",phases:[{t:"fo",s:"2026-02",e:"2026-04"}]},
  {name:"MTV-6 Activations",tbd:true,budget:"",phases:[{t:"fo",s:"2026-04",e:"2026-07"},{t:"dp",s:"2026-08",e:"2027-01"},{t:"cx",s:"2027-02",e:"2027-05"}]},
  {name:"MTV-11 Flex",tbd:true,budget:"$10-15M",phases:[{t:"fo",s:"2026-04",e:"2027-02"}]},
  {name:"FY27 Swing",tbd:true,budget:"",phases:[]},
  {name:"MTV-20 (2&3) Refresh",tbd:true,budget:"",phases:[{t:"dp",s:"2026-06",e:"2026-07"},{t:"fo",s:"2026-08",e:"2027-02"}]},
  {name:"MTV-22 Densification (+100 seats)",tbd:true,budget:"$5M?",phases:[{t:"fo",s:"2026-08",e:"2027-01"}]},
  {name:"MTV-9 Swing Space (for 8?)",tbd:false,budget:"",phases:[{t:"dp",s:"2026-10",e:"2026-11"},{t:"fo",s:"2026-12",e:"2027-01"}]},
  {name:"MTV-8 Renovation",tbd:false,budget:"",phases:[{t:"dp",s:"2026-02",e:"2027-02"},{t:"cx",s:"2027-03",e:"2027-10"},{t:"mv",s:"2027-11",e:"2027-11"}]},
  {name:"MTV-14 Renovation",tbd:false,budget:"",phases:[{t:"dp",s:"2027-03",e:"2027-11"},{t:"cx",s:"2027-12",e:"2028-05"},{t:"mv",s:"2028-06",e:"2028-06"}]},
  {name:"MTV-6 Refresh (Fitness + Cafe)",tbd:true,budget:"",phases:[{t:"dp",s:"2028-02",e:"2028-08"},{t:"cx",s:"2028-06",e:"2028-10"}]},
  {name:"Pre-C-Suite Relocation",tbd:true,budget:"",phases:[{t:"mo",s:"2027-10",e:"2027-12"}]},
  {name:"C-Suite Relocation",tbd:true,budget:"",phases:[{t:"pl",s:"2026-12",e:"2027-12"},{t:"cx",s:"2028-01",e:"2028-06"},{t:"mv",s:"2028-07",e:"2028-07"}]},
  {name:"MTV-7 Renovation",tbd:false,budget:"",phases:[{t:"pl",s:"2027-09",e:"2028-07"},{t:"cx",s:"2028-08",e:"2029-01"},{t:"mv",s:"2029-02",e:"2029-02"}]},
  {name:"MTV-9 Renovation",tbd:false,budget:"",phases:[{t:"pl",s:"2028-04",e:"2029-02"},{t:"cx",s:"2029-03",e:"2029-08"},{t:"mv",s:"2029-09",e:"2029-09"}]},
  {name:"MTV-6 Renovation",tbd:true,budget:"",phases:[{t:"pl",s:"2028-08",e:"2029-06"},{t:"cx",s:"2029-07",e:"2030-01"},{t:"mv",s:"2030-02",e:"2030-02"}]},
  {name:"MTV-5 Refresh",tbd:true,budget:"",phases:[{t:"pl",s:"2027-09",e:"2028-08"},{t:"cx",s:"2028-08",e:"2029-01"},{t:"mv",s:"2028-08",e:"2028-08"}]},
  {name:"MTV-22 Refresh",tbd:true,budget:"",phases:[{t:"pl",s:"2030-02",e:"2030-08"}]},
  {name:"Campus Streetscape",tbd:false,budget:"",phases:[{t:"dp",s:"2026-03",e:"2026-07"},{t:"cx",s:"2026-08",e:"2026-10"}]},
  {name:"Campus Exterior Activations",tbd:true,budget:"$40M",phases:[{t:"dp",s:"2027-04",e:"2028-04"},{t:"cx",s:"2028-05",e:"2029-09"}]}
];

var SA=[
  {name:"MTV-7 Flex (Floor 1)",tbd:false,budget:"",phases:[{t:"fo",s:"2026-02",e:"2026-04"}]},
  {name:"MTV-6 Activations",tbd:true,budget:"",phases:[{t:"fo",s:"2026-04",e:"2026-07"},{t:"dp",s:"2026-08",e:"2027-01"},{t:"cx",s:"2027-02",e:"2027-05"}]},
  {name:"MTV-11 Flex",tbd:true,budget:"$10-15M",phases:[{t:"fo",s:"2026-04",e:"2027-02"}]},
  {name:"FY27 Swing",tbd:true,budget:"",phases:[]},
  {name:"MTV-20 (2&3) Refresh",tbd:true,budget:"",phases:[{t:"dp",s:"2026-06",e:"2026-07"},{t:"fo",s:"2026-08",e:"2027-02"}]},
  {name:"MTV-22 Densification (+100 seats)",tbd:true,budget:"",phases:[{t:"fo",s:"2026-08",e:"2027-02"}]},
  {name:"MTV-9 Swing Space (for 8?)",tbd:false,budget:"",phases:[{t:"dp",s:"2026-10",e:"2026-11"},{t:"fo",s:"2026-12",e:"2027-01"}]},
  {name:"MTV-8 Renovation",tbd:false,budget:"",phases:[{t:"dp",s:"2026-02",e:"2027-02"},{t:"cx",s:"2027-03",e:"2027-10"},{t:"mv",s:"2027-11",e:"2027-11"}]},
  {name:"MTV-14 Renovation",tbd:false,budget:"",phases:[{t:"dp",s:"2027-03",e:"2027-11"},{t:"cx",s:"2027-11",e:"2028-05"},{t:"mv",s:"2028-06",e:"2028-06"}]},
  {name:"MTV-6 Refresh (Fitness + Cafe)",tbd:true,budget:"",phases:[{t:"dp",s:"2028-02",e:"2028-08"},{t:"cx",s:"2028-06",e:"2028-10"}]},
  {name:"Pre-C-Suite Relocation",tbd:true,budget:"",phases:[{t:"mo",s:"2027-10",e:"2027-12"}]},
  {name:"C-Suite Relocation",tbd:true,budget:"",phases:[{t:"pl",s:"2026-12",e:"2027-12"},{t:"cx",s:"2028-01",e:"2028-06"},{t:"mv",s:"2028-07",e:"2028-07"}]},
  {name:"MTV-7 Renovation",tbd:false,budget:"",phases:[{t:"pl",s:"2027-09",e:"2028-07"},{t:"cx",s:"2028-08",e:"2029-01"},{t:"mv",s:"2029-02",e:"2029-02"}]},
  {name:"MTV-9 Renovation",tbd:false,budget:"",phases:[{t:"pl",s:"2028-04",e:"2029-02"},{t:"cx",s:"2029-03",e:"2029-08"},{t:"mv",s:"2029-09",e:"2029-09"}]},
  {name:"MTV-6 Renovation",tbd:true,budget:"",phases:[{t:"pl",s:"2028-08",e:"2029-06"},{t:"cx",s:"2029-07",e:"2030-01"},{t:"mv",s:"2030-02",e:"2030-02"}]},
  {name:"MTV-5 Refresh",tbd:true,budget:"",phases:[{t:"pl",s:"2027-09",e:"2028-08"},{t:"cx",s:"2028-08",e:"2029-01"}]},
  {name:"MTV-22 Refresh",tbd:true,budget:"",phases:[{t:"pl",s:"2030-02",e:"2030-08"}]},
  {name:"Campus Streetscape",tbd:false,budget:"",phases:[{t:"dp",s:"2026-03",e:"2026-07"},{t:"cx",s:"2026-08",e:"2026-10"}]},
  {name:"Campus Exterior Activations",tbd:true,budget:"",phases:[]}
];

function clone(x){return JSON.parse(JSON.stringify(x));}
var SC={por:{label:"Plan of Record",projects:clone(POR)},sa:{label:"Scenario A",projects:clone(SA)}};
var ORD=["por","sa"],ACT="por",US=[],rds=null,bd=null;

var FY_MAP=[{start:0,fy:2026},{start:6,fy:2027},{start:18,fy:2028},{start:30,fy:2029},{start:42,fy:2030},{start:54,fy:2031}];
var TOT=60,CW=19;
var ML=["J","F","M","A","M","J","J","A","S","O","N","D"];
var MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function getFY(i){for(var j=FY_MAP.length-1;j>=0;j--){if(i>=FY_MAP[j].start)return FY_MAP[j].fy;}return 2026;}
function isFYB(i){for(var j=1;j<FY_MAP.length;j++){if(i===FY_MAP[j].start-1)return true;}return false;}
function mLabel(i){return ML[(i+1)%12];}
function colToYM(i){var mo=i+2,yr=2026+Math.floor((mo-2)/12);mo=((mo-2)%12)+2;if(mo>12){mo-=12;yr++;}return yr+"-"+(mo<10?"0"+mo:mo);}
function ymToCol(s){if(!s)return -1;var p=s.split("-");return(parseInt(p[0])-2026)*12+(parseInt(p[1])-2);}
function fmt(s){if(!s)return"";var p=s.split("-");return MN[parseInt(p[1])-1]+" '"+p[0].slice(2);}

function snap(){US.push(JSON.stringify({SC:SC,ORD:ORD,ACT:ACT}));if(US.length>30)US.shift();document.getElementById("ubtn").disabled=false;}
function doUndo(){
  if(!US.length)return;
  var p=JSON.parse(US.pop());
  Object.keys(SC).forEach(function(k){delete SC[k];});Object.assign(SC,p.SC);
  ORD.length=0;p.ORD.forEach(function(k){ORD.push(k);});ACT=p.ACT;
  document.getElementById("ubtn").disabled=US.length===0;
  closeEd();rTabs();render();sv();
}
function sv(){try{localStorage.setItem("mtvg8",JSON.stringify({SC:SC,ORD:ORD,ACT:ACT}));}catch(e){}}
function ld(){
  try{
    var r=localStorage.getItem("mtvg8");if(!r)return;
    var d=JSON.parse(r);
    Object.keys(SC).forEach(function(k){delete SC[k];});Object.assign(SC,d.SC);
    ORD.length=0;d.ORD.forEach(function(k){ORD.push(k);});ACT=d.ACT;
  }catch(e){}
}

function peak(ps){var mc=new Array(TOT).fill(0);ps.forEach(function(p){p.phases.forEach(function(ph){if(ph.t==="mv"||ph.t==="xx")return;var s=ymToCol(ph.s),e=ymToCol(ph.e);for(var i=Math.max(0,s);i<=Math.min(TOT-1,e);i++)mc[i]++;});});return Math.max.apply(null,mc);}
function comp(ps){var l=-1;ps.forEach(function(p){p.phases.forEach(function(ph){var e=ymToCol(ph.e||ph.s);if(e>l)l=e;});});return l<0?"—":fmt(colToYM(l));}

function rTabs(){
  var h=ORD.map(function(k){return'<button class="stab'+(k===ACT?" active":"")+'" onclick="setS(\''+k+'\')">'+SC[k].label+"</button>";}).join("");
  h+='<span id="nsa"><button class="stab-add" onclick="showNS()">+ New scenario</button></span>';
  document.getElementById("tabs").innerHTML=h;
}
function showNS(){
  document.getElementById("nsa").innerHTML='<input id="nsi" placeholder="Name..." style="font-size:12px;padding:4px 8px;height:28px;border:1px solid #ccc;border-radius:4px;width:140px"><button class="btn" onclick="addS()" style="margin-left:4px">Add</button><button class="btn" onclick="rTabs()" style="margin-left:2px">✕</button>';
  var inp=document.getElementById("nsi");inp.focus();
  inp.addEventListener("keydown",function(e){if(e.key==="Enter")addS();if(e.key==="Escape")rTabs();});
}
function addS(){
  var inp=document.getElementById("nsi");var name=inp?inp.value.trim():"";if(!name)return;
  snap();var k="s"+Date.now();
  SC[k]={label:name,projects:clone(SC.por.projects)};
  ORD.push(k);ACT=k;rTabs();render();
}
function setS(k){ACT=k;closeEd();rTabs();render();}

function render(){
  sv();
  var ps=SC[ACT].projects;
  var tod=new Date();var todCol=(tod.getFullYear()-2026)*12+(tod.getMonth()+1-2);
  var conf=ps.filter(function(p){return!p.tbd;}).length;
  document.getElementById("summary").innerHTML=
    '<div class="scard"><div class="scard-label">Confirmed</div><div class="scard-val">'+conf+" / "+ps.length+"</div></div>"+
    '<div class="scard"><div class="scard-label">Peak concurrent</div><div class="scard-val">'+peak(ps)+"</div></div>"+
    '<div class="scard"><div class="scard-label">Est. completion</div><div class="scard-val">'+comp(ps)+"</div></div>";

  var TW=18+170+72+40+22+(TOT*CW);
  var h='<div style="overflow-x:auto"><table style="border-collapse:collapse;width:'+TW+'px"><colgroup>'+
    '<col style="width:18px"><col style="width:170px"><col style="width:72px"><col style="width:40px"><col style="width:22px">'+
    new Array(TOT).fill('<col style="width:'+CW+'px">').join("")+"</colgroup><thead><tr>"+
    '<th style="background:#fafafa;border-bottom:1px solid #e0e0e0"></th>'+
    '<th style="background:#fafafa;border-bottom:1px solid #e0e0e0;text-align:left;padding-left:8px;font-size:11px;font-weight:500;color:#888">Project</th>'+
    '<th style="background:#fafafa;border-bottom:1px solid #e0e0e0;font-size:10px;color:#888;text-align:center">Budget</th>'+
    '<th style="background:#fafafa;border-bottom:1px solid #e0e0e0;font-size:10px;color:#888;text-align:center">Status</th>'+
    '<th style="background:#fafafa;border-bottom:1px solid #e0e0e0"></th>';

  var lastFY=null,i;
  for(i=0;i<TOT;i++){
    var fy=getFY(i);
    if(fy!==lastFY){
      var span=0;for(var j=i;j<TOT&&getFY(j)===fy;j++)span++;
      h+='<th colspan="'+span+'" style="background:#2C2C2A;color:#fff;font-size:11px;font-weight:600;text-align:center;border-right:1px solid #555;padding:3px 0">FY'+fy+"</th>";
      lastFY=fy;i+=span-1;
    }
  }
  h+="</tr><tr>"+
    '<th style="background:#fafafa;border-bottom:1px solid #ddd"></th>'+
    '<th style="background:#fafafa;border-bottom:1px solid #ddd"></th>'+
    '<th style="background:#fafafa;border-bottom:1px solid #ddd"></th>'+
    '<th style="background:#fafafa;border-bottom:1px solid #ddd"></th>'+
    '<th style="background:#fafafa;border-bottom:1px solid #ddd"></th>';
  for(i=0;i<TOT;i++){
    h+='<th style="width:'+CW+'px;background:#fafafa;border-bottom:1px solid #ddd;font-size:10px;color:#888;text-align:center;padding:2px 0;'+(isFYB(i)?"border-right:1px solid #aaa;":"")+'">'+mLabel(i)+"</th>";
  }
  h+="</tr></thead><tbody>";

  ps.forEach(function(p,pi){
    h+='<tr draggable="true" data-pi="'+pi+'" ondragstart="rdS(event,'+pi+')" ondragover="rdO(event,'+pi+')" ondrop="rdD(event,'+pi+')" ondragleave="rdL(event)" ondragend="rdE()">'+
      '<td style="text-align:center;border-bottom:1px solid #f0f0f0;padding:0 2px"><span class="dh">⠿</span></td>'+
      '<td style="padding:3px 6px;font-size:11px;border-bottom:1px solid #f0f0f0;white-space:nowrap;cursor:pointer;overflow:hidden;text-overflow:ellipsis;max-width:170px" onclick="opnP('+pi+')">'+
        '<span style="color:#ccc;font-size:10px;margin-right:3px">✎</span>'+p.name+"</td>"+
      '<td style="padding:2px 4px;font-size:11px;color:#888;border-bottom:1px solid #f0f0f0;text-align:center;cursor:pointer" onclick="opnP('+pi+')">'+(p.budget||"—")+"</td>"+
      '<td style="border-bottom:1px solid #f0f0f0;text-align:center;padding:2px 4px">'+
        '<span class="tbd-pill" style="background:'+(p.tbd?"#f0f0f0":"#e8f5e9")+';color:'+(p.tbd?"#888":"#2e7d32")+'" onclick="togT('+pi+')">'+(p.tbd?"TBD":"✓")+"</span></td>"+
      '<td style="border-bottom:1px solid #f0f0f0;text-align:center"><button class="ib" onclick="delR('+pi+')">×</button></td>';

    for(i=0;i<TOT;i++){
      var isT=(i===todCol),bars="";
      p.phases.forEach(function(ph,phi){
        var sc2=ymToCol(ph.s),ec=ymToCol(ph.e||ph.s);
        if(ph.t==="mv"){
          if(sc2===i)bars+='<div class="bar b-mv" style="left:4px" onmousedown="bMD(event,'+pi+','+phi+',\'move\')"></div>';
        } else {
          if(sc2===i){
            var w=(ec-sc2+1)*CW-2;
            bars+='<div class="bar b-'+ph.t+'" style="left:1px;width:'+w+'px" onmousedown="bMD(event,'+pi+','+phi+',\'move\')" title="'+PM[ph.t].label+': '+fmt(ph.s)+' \u2192 '+fmt(ph.e)+'">'+
              '<div class="rh" style="left:0" onmousedown="bMD(event,'+pi+','+phi+',\'rs\')"></div>'+
              '<div class="rh" style="right:0" onmousedown="bMD(event,'+pi+','+phi+',\'re\')"></div></div>';
          }
        }
      });
      h+='<td class="mc" style="position:relative;height:24px;border-bottom:1px solid #f0f0f0;width:'+CW+'px;'+(isFYB(i)?"border-right:1px solid #aaa;":"")+(isT?"background:rgba(226,75,74,0.07);":"")+'">'+(bars)+"</td>";
    }
    h+="</tr>";
  });
  h+='<tr><td colspan="'+(5+TOT)+'" style="padding:6px 8px"><button class="ib" style="font-size:12px;color:#888" onclick="addR()">+ Add project</button></td></tr></tbody></table></div>';
  document.getElementById("gwrap").innerHTML=h;

  if(todCol>=0&&todCol<TOT){
    var cells=document.querySelectorAll("td.mc"),found=null;
    for(var ci=0;ci<cells.length;ci++){if(ci%TOT===todCol){found=cells[ci];break;}}
    if(found){
      var wr=document.getElementById("gwrap");
      var x=found.getBoundingClientRect().left-wr.getBoundingClientRect().left+found.offsetWidth/2+wr.scrollLeft;
      var ln=document.createElement("div");
      ln.style.cssText="position:absolute;top:0;bottom:0;left:"+x+"px;width:2px;background:#E24B4A;pointer-events:none;z-index:10";
      wr.appendChild(ln);
    }
  }
  document.getElementById("note").textContent="Drag bars to shift \u00b7 drag edges to resize \u00b7 click \u270e to edit";
}

function bMD(e,pi,phi,mode){
  e.preventDefault();e.stopPropagation();snap();
  var ph=SC[ACT].projects[pi].phases[phi];
  bd={pi:pi,phi:phi,mode:mode,x0:e.clientX,s0:ymToCol(ph.s),e0:ymToCol(ph.e||ph.s),isMv:ph.t==="mv"};
  document.addEventListener("mousemove",bMM);document.addEventListener("mouseup",bMU);
}
function bMM(e){
  if(!bd)return;
  var dm=Math.round((e.clientX-bd.x0)/CW);
  var ph=SC[ACT].projects[bd.pi].phases[bd.phi];
  var ns=bd.s0,ne=bd.e0;
  if(bd.mode==="move"){ns=bd.s0+dm;ne=bd.e0+dm;}
  else if(bd.mode==="re"){ne=Math.max(bd.s0,bd.e0+dm);}
  else if(bd.mode==="rs"){ns=Math.min(bd.e0,bd.s0+dm);}
  ns=Math.max(0,Math.min(TOT-1,ns));ne=Math.max(0,Math.min(TOT-1,ne));
  ph.s=colToYM(ns);ph.e=bd.isMv?ph.s:colToYM(ne);
  var t=document.getElementById("tip");t.style.display="block";t.style.left=(e.clientX+12)+"px";t.style.top=(e.clientY-28)+"px";
  t.textContent=fmt(ph.s)+(bd.isMv?"":" \u2192 "+fmt(ph.e));
  render();
}
function bMU(){bd=null;document.getElementById("tip").style.display="none";document.removeEventListener("mousemove",bMM);document.removeEventListener("mouseup",bMU);}

function rdS(e,i){rds=i;e.currentTarget.classList.add("dragging");e.dataTransfer.effectAllowed="move";}
function rdO(e,i){
  e.preventDefault();document.querySelectorAll("tr[data-pi]").forEach(function(r){r.classList.remove("drag-over","drag-over-below");});
  if(i===rds)return;
  var below=e.clientY>e.currentTarget.getBoundingClientRect().top+e.currentTarget.getBoundingClientRect().height/2;
  e.currentTarget.classList.add(below?"drag-over-below":"drag-over");e.currentTarget.dataset.dropBelow=below?"1":"0";
}
function rdL(e){e.currentTarget.classList.remove("drag-over","drag-over-below");}
function rdE(){document.querySelectorAll("tr[data-pi]").forEach(function(r){r.classList.remove("dragging","drag-over","drag-over-below");});}
function rdD(e,ti){
  e.preventDefault();if(rds===null||rds===ti)return;snap();
  var below=e.currentTarget.dataset.dropBelow==="1";
  var p=SC[ACT].projects,m=p.splice(rds,1)[0];
  var ni=rds<ti?(below?ti:ti-1):(below?ti+1:ti);
  p.splice(Math.max(0,Math.min(p.length,ni)),0,m);
  rds=null;closeEd();render();
}

function epanel(title,body){document.getElementById("ed").innerHTML='<div class="ov" onclick="closeEd()"><div class="ep" onclick="event.stopPropagation()"><div class="et">'+title+'<button class="ib" style="font-size:16px" onclick="closeEd()">\u00d7</button></div>'+body+"</div></div>";}

function opnP(pi){
  var p=SC[ACT].projects[pi];
  var rows=p.phases.map(function(ph,i){
    return'<div class="pr"><div class="pd" style="background:'+PM[ph.t].color+'"></div><span style="flex:1">'+PM[ph.t].label+"</span>"+
      '<span style="font-size:10px;color:#999;margin-right:4px">'+fmt(ph.s)+(ph.t!=="mv"?" \u2192 "+fmt(ph.e):"")+"</span>"+
      '<button class="ib" onclick="opnPh(null,'+pi+','+i+')">\u270e</button><button class="ib" onclick="delPh('+pi+','+i+')">\u00d7</button></div>';
  }).join("");
  var opts=Object.entries(PM).map(function(kv){return'<option value="'+kv[0]+'">'+kv[1].label+"</option>";}).join("");
  epanel("Edit project",
    '<div class="fi"><label>Project name</label><input id="en" value="'+p.name+'"></div>'+
    '<div class="fi"><label>Budget</label><input id="eb" value="'+(p.budget||"")+'"></div>'+
    '<div class="fi"><label>Status</label><select id="et"><option value="false"'+(!p.tbd?" selected":"")+">Confirmed</option><option value=\"true\""+(p.tbd?" selected":"")+">TBD</option></select></div>"+
    '<div style="font-size:11px;font-weight:500;color:#888;margin:10px 0 6px">Phases</div>'+rows+
    '<div style="display:flex;gap:6px;margin-top:8px;align-items:center"><select id="npt" style="flex:1;font-size:11px;height:28px;border:1px solid #ddd;border-radius:4px">'+opts+'</select><button class="eb" style="flex:none;padding:4px 8px" onclick="addPh('+pi+')">+ Add</button></div>'+
    '<div style="display:flex;gap:6px;margin-top:12px"><button class="eb" onclick="svP('+pi+')">Save</button><button class="eb eb-d" onclick="delR('+pi+')">Delete row</button></div>');
}
function opnPh(ev,pi,phi){
  if(ev)ev.stopPropagation();
  var p=SC[ACT].projects[pi],ph=p.phases[phi],isMv=ph.t==="mv";
  var opts=Object.entries(PM).map(function(kv){return'<option value="'+kv[0]+'"'+(ph.t===kv[0]?" selected":"")+">"+kv[1].label+"</option>";}).join("");
  epanel("Edit phase",
    '<div style="font-size:11px;color:#888;margin-bottom:10px">'+p.name+"</div>"+
    '<div class="fi"><label>Phase type</label><select id="ept">'+opts+"</select></div>"+
    '<div class="fi"><label>Start (YYYY-MM)</label><input id="eps" value="'+ph.s+'"></div>'+
    (!isMv?'<div class="fi"><label>End (YYYY-MM)</label><input id="epe" value="'+(ph.e||"")+'"></div>':"")+
    '<div style="display:flex;gap:6px;margin-top:12px"><button class="eb" onclick="svPh('+pi+','+phi+')">Save</button><button class="eb eb-d" onclick="delPh('+pi+','+phi+')">Remove</button><button class="eb" onclick="opnP('+pi+')"><- Back</button></div>');
}
function closeEd(){document.getElementById("ed").innerHTML="";}
function svP(pi){snap();var p=SC[ACT].projects[pi];p.name=document.getElementById("en").value.trim()||p.name;p.budget=document.getElementById("eb").value.trim();p.tbd=document.getElementById("et").value==="true";closeEd();render();}
function svPh(pi,phi){
  snap();var ph=SC[ACT].projects[pi].phases[phi];
  ph.t=document.getElementById("ept").value;ph.s=document.getElementById("eps").value.trim();
  var ee=document.getElementById("epe");ph.e=ph.t==="mv"?ph.s:(ee?ee.value.trim():ph.s)||ph.s;
  closeEd();render();
}
function addPh(pi){
  snap();var p=SC[ACT].projects[pi];var t=document.getElementById("npt").value;
  var last=p.phases[p.phases.length-1];var ds=last?(last.e||last.s):"2026-02";
  p.phases.push({t:t,s:ds,e:t==="mv"?ds:ds});var phi=p.phases.length-1;
  closeEd();render();opnPh(null,pi,phi);
}
function delPh(pi,phi){snap();SC[ACT].projects[pi].phases.splice(phi,1);closeEd();render();}
function delR(pi){snap();SC[ACT].projects.splice(pi,1);closeEd();render();}
function addR(){snap();SC[ACT].projects.push({name:"New project",tbd:true,budget:"",phases:[{t:"dp",s:"2026-02",e:"2026-06"}]});render();opnP(SC[ACT].projects.length-1);}
function togT(pi){snap();SC[ACT].projects[pi].tbd=!SC[ACT].projects[pi].tbd;render();}

function doExport(){
  var json=JSON.stringify({SC:SC,ORD:ORD,ACT:ACT},null,2);
  epanel("Copy your data",
    '<p style="font-size:11px;color:#888;margin-bottom:8px">Select all (Cmd+A) and copy (Cmd+C), save as .json</p>'+
    '<textarea style="width:100%;height:220px;font-size:10px;font-family:monospace;border:1px solid #ddd;border-radius:4px;padding:6px;resize:vertical">'+json+"</textarea>"+
    '<button class="eb" style="margin-top:8px;width:100%" onclick="closeEd()">Done</button>');
}
function showImport(){
  epanel("Paste JSON to import",
    '<p style="font-size:11px;color:#888;margin-bottom:8px">Paste your saved JSON then click Load.</p>'+
    '<textarea id="ita" style="width:100%;height:200px;font-size:11px;font-family:monospace;border:1px solid #ddd;border-radius:4px;padding:6px;resize:vertical"></textarea>'+
    '<div style="display:flex;gap:6px;margin-top:10px"><button class="eb" onclick="doImport()">Load</button><button class="eb" onclick="closeEd()">Cancel</button></div>'+
    '<div id="ierr" style="font-size:11px;color:#c0392b;margin-top:6px"></div>');
}
function doImport(){
  var raw=document.getElementById("ita").value.trim();
  try{
    var d=JSON.parse(raw);if(!d.SC||!d.ORD||!d.ACT)throw new Error("Missing fields");
    Object.keys(SC).forEach(function(k){delete SC[k];});Object.assign(SC,d.SC);
    ORD.length=0;d.ORD.forEach(function(k){ORD.push(k);});ACT=d.ACT;
    closeEd();rTabs();render();sv();
  }catch(e){document.getElementById("ierr").textContent="Error: "+e.message;}
}

ld();rTabs();render();
</script>
</body>
</html>
